<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ML/AI Flowchart — Telecom Data Platform</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0D1117;
            font-family: 'IBM Plex Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px 80px;
            min-height: 100vh;
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title h1 {
            font-size: 22px;
            font-weight: 600;
            color: #E6EDF3;
            letter-spacing: -0.01em;
        }

        .page-title p {
            font-size: 13px;
            color: #7D8590;
            margin-top: 6px;
            font-family: 'IBM Plex Mono', monospace;
        }

        svg {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 8px 40px rgba(0, 0, 0, 0.5));
        }

        /* node styles */
        .node-process rect {
            rx: 6;
            ry: 6;
        }

        .node-decision polygon {}

        .node-term rect {
            rx: 24;
            ry: 24;
        }

        .node-store rect {
            rx: 6;
            ry: 6;
        }

        /* tooltip */
        .tip {
            position: fixed;
            background: #161B22;
            border: 1px solid #30363D;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #C9D1D9;
            pointer-events: none;
            max-width: 240px;
            line-height: 1.55;
            display: none;
            z-index: 999;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
